<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Img 图片可视化工具，支持 URL、Base64、Data URI、SVG 和本地图片拖拽预览。">
  <title>Img - 图片可视化工具</title>
  <link rel="stylesheet" href="img.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div>
        <p class="eyebrow">Tools / Img</p>
        <h1>Img 图片可视化工具</h1>
        <p class="subtitle">支持图片 URL、Data URI、原始 Base64、SVG 代码和本地拖拽文件预览。</p>
      </div>
      <a class="back-link" href="/">返回首页</a>
    </header>

    <main>
      <section class="panel input-panel">
        <div class="panel-heading">
          <h2>输入内容</h2>
          <p>支持粘贴、拖放和快捷键 `Ctrl + Enter`。</p>
        </div>
        <div class="mode-toggle">
          <button class="mode-btn active" type="button" data-mode="auto">自动识别</button>
          <button class="mode-btn" type="button" data-mode="image">图片模式</button>
          <button class="mode-btn" type="button" data-mode="svg">SVG 模式</button>
        </div>

        <label class="sr-only" for="sourceInput">图片内容输入框</label>
        <textarea id="sourceInput" placeholder="请粘贴图片 URL、Data URI、Base64 字符串或 SVG 代码" rows="12"></textarea>

        <div class="helper-list">
          <button class="example-chip" type="button" data-example="url">示例 URL</button>
          <button class="example-chip" type="button" data-example="base64">示例 Base64</button>
          <button class="example-chip" type="button" data-example="svg">示例 SVG</button>
        </div>

        <div class="drop-hint" id="dropHint">也可以把本地图片文件直接拖到输入框</div>

        <div class="button-group">
          <button id="visualizeBtn" type="button">开始预览</button>
          <button id="clearBtn" type="button" class="secondary-btn">清空</button>
        </div>
      </section>

      <section class="panel preview-panel">
        <div class="panel-heading">
          <h2>预览结果</h2>
          <p id="statusText">等待输入</p>
        </div>

        <div id="emptyState" class="empty-state">
          <p>输入任意图片内容后点击“开始预览”，右侧会展示图片与解析信息。</p>
        </div>

        <div id="error" class="error-section" hidden>
          <p id="errorMessage"></p>
        </div>

        <div id="result" class="result-section" hidden>
          <div id="previewSurface" class="image-container">
            <img id="previewImage" alt="预览图片" hidden>
            <div id="svgPreview" hidden></div>
          </div>

          <div class="info-item">
            <span class="label">输入类型:</span>
            <span id="inputType">-</span>
          </div>
          <div class="info-item">
            <span class="label">图片尺寸:</span>
            <span id="imageDimensions">-</span>
          </div>
          <div class="info-item">
            <span class="label">输入长度:</span>
            <span id="base64Length">-</span>
          </div>
          <div class="info-item">
            <span class="label">图片格式:</span>
            <span id="imageFormat">-</span>
          </div>

          <div class="button-group">
            <button id="downloadBtn" type="button">下载</button>
            <button id="fullscreenBtn" type="button">全屏查看</button>
            <button id="copyBtn" type="button" class="secondary-btn">复制输入内容</button>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <div id="fullscreenOverlay" class="fullscreen-overlay" hidden>
      <button id="closeFullscreenBtn" class="close-btn" type="button" aria-label="关闭全屏">×</button>
      <div id="fullscreenContent" class="fullscreen-content"></div>
    </div>

    <footer>
      <p>适合快速查看接口返回图片、调试 Base64 数据和检查 SVG 渲染结果。</p>
    </footer>
  </div>

  <script src="img.js"></script>
</body>
</html>
